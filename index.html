  return `<div style="font-size:11px;color:#999;margin-top:8px">${t('img_source')}: `+
         `<a href="${s.u}" target="_blank" rel="noopener" style="color:#999">${s.n}</a></div>`; }

/* ===========================================================================
   OPEN-LINK ACCESS — soft "one participation per person" lock
   (localStorage; honest participants only. try/catch: private mode may block it)
   =========================================================================== */
function alreadyDone(){
  if(TEST_MODE) return false;
  try { return !!localStorage.getItem(DONE_KEY); } catch(e){ return false; }
}
function markDone(){
  if(TEST_MODE) return;
  // store the participant code too, so a repeat visit can re-display it (consent promises the code)
  try { localStorage.setItem(DONE_KEY, JSON.stringify({ done:new Date().toISOString(), code:subject_id })); } catch(e){ /* ignore */ }
}
function doneInfo(){
  try { return JSON.parse(localStorage.getItem(DONE_KEY) || "null"); } catch(e){ return null; }
}
function contactLine(){   // researcher contact for deletion requests / failed-save rescue (only if configured)
  return CONTACT_EMAIL
    ? `<div style="margin-top:6px">${t('contact_line')}<a href="mailto:${CONTACT_EMAIL}">${CONTACT_EMAIL}</a></div>` : '';
}

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function makeCrowd(seed,w,h,nClusters=1){
  const r=mulberry32(seed); const pts=[];
  for(let c=0;c<nClusters;c++){
    const cx=w*(0.20+0.60*r()), cy=h*(0.20+0.60*r());
    const nd=70+Math.floor(60*r());
    for(let i=0;i<nd;i++) pts.push([cx+(r()-0.5)*w*0.26, cy+(r()-0.5)*h*0.26]);
  }
  for(let i=0;i<35;i++) pts.push([r()*w, r()*h]);
  return pts.filter(p=>p[0]>3&&p[0]<w-3&&p[1]>3&&p[1]<h-3);
}
function svgURI(inner,w,h){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${inner}</svg>`;
  return "data:image/svg+xml,"+encodeURIComponent(svg);
}
function dotsSVG(pts){ return pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.1" fill="#333"/>`).join(''); }
// dark core + white casing (hue-independent, color-vision-deficiency safe), to match the rendered stimuli
const STK ='stroke="#111111" stroke-width="2.4" fill="none" stroke-linecap="round"';   // dark core
const STKH='stroke="#ffffff" stroke-width="5"   fill="none" stroke-linecap="round"';   // white casing
function gridOverlay(w,h){ let s=''; const n=3;
  for(let i=1;i<n;i++){ s+=`<line x1="${(i*w/n).toFixed(1)}" y1="0" x2="${(i*w/n).toFixed(1)}" y2="${h}" ${STK}/>`;
                        s+=`<line x1="0" y1="${(i*h/n).toFixed(1)}" x2="${w}" y2="${(i*h/n).toFixed(1)}" ${STK}/>`; } return s; }
function quadOverlay(w,h){ let s='';
  s+=`<line x1="${w/2}" y1="0" x2="${w/2}" y2="${h}" ${STK}/>`;
  s+=`<line x1="0" y1="${h/2}" x2="${w}" y2="${h/2}" ${STK}/>`;
  s+=`<line x1="${3*w/4}" y1="0" x2="${3*w/4}" y2="${h/2}" ${STK}/>`;
  s+=`<line x1="${w/2}" y1="${h/4}" x2="${w}" y2="${h/4}" ${STK}/>`;
  s+=`<line x1="${w/4}" y1="${h/2}" x2="${w/4}" y2="${h}" ${STK}/>`;
  s+=`<line x1="0" y1="${3*h/4}" x2="${w/2}" y2="${3*h/4}" ${STK}/>`; return s; }
function voronoiOverlay(w,h){ let s='';
  s+=`<polyline points="${0.45*w},0 ${0.55*w},${0.35*h} ${0.40*w},${0.72*h} ${0.50*w},${h}" ${STK}/>`;
  s+=`<polyline points="${0.55*w},${0.35*h} ${w},${0.45*h}" ${STK}/>`;
  s+=`<polyline points="0,${0.60*h} ${0.40*w},${0.72*h}" ${STK}/>`;
  s+=`<polyline points="${0.55*w},${0.35*h} ${0.70*w},0" ${STK}/>`; return s; }
function panel(pts,overlay,w,h){
  const inner=`<rect x="0" y="0" width="${w}" height="${h}" fill="#f4f4f2"/>`+dotsSVG(pts)+(overlay||'');
  return svgURI(inner,w,h);
}
// example illustrations for the draw instructions:
// a few sensible dividing lines vs. too many arbitrary ones
function exLines(L){ return k=>L.map(([a,b,c,d])=>`<line x1="${a}" y1="${b}" x2="${c}" y2="${d}" ${k}/>`).join(''); }
// two clearly separated groups with an empty vertical gap around x≈76 (deterministic jitter ≤ ±20,
// so no point ever lands in the gap) — used by BOTH example panels so good/bad show the same crowd
function exCrowd2(){ const w=150,h=110, r=mulberry32(11), pts=[];
  for(const [cx,cy] of [[40,52],[112,58]])
    for(let i=0;i<50;i++) pts.push([cx+(r()-0.5)*40, cy+(r()-0.5)*60]);
  return pts.filter(p=>p[0]>4&&p[0]<w-4&&p[1]>4&&p[1]<h-4); }
function exPartGood(){ const w=150,h=110; const pts=exCrowd2();
  const ln=k=>`<polyline points="78,2 72,40 82,74 76,108" ${k}/>`;   // one divider sitting in the gap
  return svgURI(`<rect width="${w}" height="${h}" fill="#f4f4f2"/>${dotsSVG(pts)}${ln(STKH)}${ln(STK)}`,w,h); }
function exPartMany(){ const w=150,h=110; const pts=exCrowd2(); const L=[];
  for(let i=1;i<6;i++) L.push([i*25,0,i*25,h]);
  for(let i=1;i<4;i++) L.push([0,i*27,w,i*27]);
  const ln=exLines(L);
  return svgURI(`<rect width="${w}" height="${h}" fill="#f4f4f2"/>${dotsSVG(pts)}${ln(STKH)}${ln(STK)}`,w,h); }

/* ===========================================================================
   geometry helpers for draw guardrails
   =========================================================================== */
function shoelace(p){ let a=0; for(let i=0;i<p.length-1;i++){ a+=p[i].x*p[i+1].y - p[i+1].x*p[i].y; } return Math.abs(a)/2; }
function ccw(a,b,c){ return (c.y-a.y)*(b.x-a.x) > (b.y-a.y)*(c.x-a.x); }
function segInt(a,b,c,d){ return ccw(a,c,d)!==ccw(b,c,d) && ccw(a,b,c)!==ccw(a,b,d); }
function downsample(p,k){ if(p.length<=k) return p.slice(); const out=[]; const step=(p.length-1)/(k-1);
  for(let i=0;i<k;i++) out.push(p[Math.round(i*step)]); return out; }
function dedupe(p,eps=5){ const out=[p[0]]; for(let i=1;i<p.length;i++){ const a=out[out.length-1],b=p[i];
  if(Math.hypot(b.x-a.x,b.y-a.y)>=eps) out.push(b); } return out; }
function polylineLength(p){ let L=0; for(let i=1;i<p.length;i++) L+=Math.hypot(p[i].x-p[i-1].x,p[i].y-p[i-1].y); return L; }
function selfIntersects(poly){ // closed ring; flags only "significant" lobe crossings (e.g. figure-8),
  const n=poly.length-1; if(n<6) return false;          // tolerating small local wiggles (lenient).
  const sep=Math.max(3, Math.floor(n*0.12));            // crossing edges must be far apart along the path
  for(let i=0;i<n;i++) for(let j=i+1;j<n;j++){
    const arc=Math.min(j-i, n-(j-i));
    if(arc<=sep) continue;                              // skip near/adjacent edges (local jitter)
    if(segInt(poly[i],poly[i+1],poly[j],poly[j+1])) return true;
  } return false; }

/* ===========================================================================
   CUSTOM PLUGIN: draw the crowd groups (with guardrails)
   =========================================================================== */
const PT = jsPsychModule.ParameterType;
class DrawGroupsPlugin {
  static info = {
    name: "draw-groups", version: "2.0.0",
    parameters: {
      image_src:{type:PT.STRING,default:""}, prompt:{type:PT.HTML_STRING,default:""},
      hint:{type:PT.HTML_STRING,default:""}, target_loops:{type:PT.INT,default:1}, max_loops:{type:PT.INT,default:3},
      canvas_width:{type:PT.INT,default:600}, canvas_height:{type:PT.INT,default:450}, image_id:{type:PT.INT,default:0},
      undo_label:{type:PT.STRING,default:"Undo"}, clear_label:{type:PT.STRING,default:"Clear"}, done_label:{type:PT.STRING,default:"Done"},
      err_none:{type:PT.STRING,default:""}, err_open:{type:PT.STRING,default:""},
      err_cross:{type:PT.STRING,default:""}, err_many:{type:PT.STRING,default:""}
    },
    data:{ strokes:{type:PT.STRING}, n_strokes:{type:PT.INT}, target_loops:{type:PT.INT},
           canvas_width:{type:PT.INT}, canvas_height:{type:PT.INT}, image_id:{type:PT.INT}, rt:{type:PT.INT} }
  };
  constructor(jsPsych){ this.jsPsych=jsPsych; }
  trial(display_element, trial){
    const W=trial.canvas_width, H=trial.canvas_height;
    display_element.innerHTML = `
      ${trial.prompt}
      <p style="color:#555;margin:4px 0">${trial.hint}</p>
      <div><canvas id="dg" width="${W}" height="${H}"
           style="border:1px solid #999;cursor:crosshair;touch-action:none;max-width:100%"></canvas></div>
      <div id="dgerr" style="color:#c0392b;min-height:1.3em;margin:8px;font-weight:bold"></div>
      <div>
        <button class="jspsych-btn" id="dgundo">${trial.undo_label}</button>
        <button class="jspsych-btn" id="dgclear">${trial.clear_label}</button>
        <button class="jspsych-btn" id="dgdone">${trial.done_label}</button>
      </div>`;
    const canvas=display_element.querySelector('#dg'), ctx=canvas.getContext('2d');
    const errEl=display_element.querySelector('#dgerr');
    const img=new Image(); let strokes=[], cur=null, drawing=false; const t0=performance.now();

    function redraw(){
      ctx.clearRect(0,0,W,H);
      if(img.complete && img.naturalWidth) ctx.drawImage(img,0,0,W,H);
      ctx.lineJoin='round'; ctx.lineCap='round';
      const all = cur ? strokes.concat([cur]) : strokes;
      // white casing then dark core -> visible on any background, color-blind safe (no hue)
      for(const pass of [{w:6,c:'rgba(255,255,255,0.95)'},{w:2.6,c:'rgba(17,17,17,0.97)'}]){
        ctx.lineWidth=pass.w; ctx.strokeStyle=pass.c;
        for(const s of all){ if(s.length<1) continue; ctx.beginPath(); ctx.moveTo(s[0].x,s[0].y);
          for(let i=1;i<s.length;i++) ctx.lineTo(s[i].x,s[i].y);
          ctx.stroke(); }   // open dividing lines (not closed loops)
      }
    }
    img.onload=redraw; img.src=trial.image_src;

    function pos(e){ const r=canvas.getBoundingClientRect();
      const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left, cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
      return {x:Math.round(cx*W/r.width), y:Math.round(cy*H/r.height)}; }
    const start=(e)=>{ e.preventDefault(); drawing=true; cur=[pos(e)]; errEl.textContent=''; redraw(); };
    const move =(e)=>{ if(!drawing) return; e.preventDefault(); cur.push(pos(e)); redraw(); };
    const end  =(e)=>{ if(!drawing) return; e.preventDefault(); if(cur&&cur.length>2) strokes.push(cur); cur=null; drawing=false; redraw(); };
    canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
    canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end,{passive:false});

    display_element.querySelector('#dgundo').onclick  = ()=>{ strokes.pop(); errEl.textContent=''; redraw(); };
    display_element.querySelector('#dgclear').onclick = ()=>{ strokes=[]; errEl.textContent=''; redraw(); };
    display_element.querySelector('#dgdone').onclick  = ()=>{
      const minLen = 0.08*Math.hypot(W,H);   // a real divider spans a chunk of the image; drop tiny dabs
      const clean=[];
      for(const s of strokes){
        const ds=dedupe(s);                          // drop near-duplicate samples
        if(ds.length<2) continue;
        if(polylineLength(ds) < minLen) continue;    // too short -> ignore (not an error)
        clean.push(ds);                              // keep raw open polyline (boundary map built offline)
      }
      if(clean.length===0){ errEl.textContent=trial.err_none; return; }
      if(clean.length>trial.max_loops){ errEl.textContent=trial.err_many.replace('{M}',trial.max_loops); return; }
      window.removeEventListener('mouseup',end);
      const data={ strokes:JSON.stringify(clean), n_strokes:clean.length, target_loops:trial.target_loops,
                   canvas_width:W, canvas_height:H, image_id:trial.image_id, rt:Math.round(performance.now()-t0) };
      display_element.innerHTML='';
      this.jsPsych.finishTrial(data);
    };
  }
}

// ── Custom BWS: ONE screen — click BEST (green), then WORST (red); undo + next ──
class BwsPlugin {
  static info = {
    name: "bws-pick", version: "1.0.0",
    parameters: {
      imgs:           { type: PT.STRING,      default: "[]" },  // JSON: image URLs at A/B/C
      methods:        { type: PT.STRING,      default: "[]" },  // JSON: method at A/B/C (data only)
      prompt:         { type: PT.HTML_STRING, default: "" },
      src_html:       { type: PT.HTML_STRING, default: "" },
      practice:       { type: PT.BOOL,        default: false },
      practice_label: { type: PT.STRING,      default: "" },
      badge_best:     { type: PT.STRING,      default: "BEST" },
      badge_worst:    { type: PT.STRING,      default: "WORST" },
      undo_label:     { type: PT.STRING,      default: "Undo" },
      next_label:     { type: PT.STRING,      default: "Next" }
    },
    data: {
      best_pos: { type: PT.INT }, worst_pos: { type: PT.INT },
      best_method: { type: PT.STRING }, worst_method: { type: PT.STRING }, rt: { type: PT.INT }
    }
  };
  constructor(jsPsych){ this.jsPsych = jsPsych; }
  trial(display_element, trial){
    const imgs = JSON.parse(trial.imgs), methods = JSON.parse(trial.methods), labels = ['A','B','C'];
    const t0 = performance.now();
    let best = null, worst = null;
    display_element.innerHTML = `
      ${trial.practice ? `<div class="practice-banner">${trial.practice_label}</div>` : ''}
      <p>${trial.prompt}</p>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin:8px 0">
        ${imgs.map((src,i)=>`
          <div class="bws-panel" data-i="${i}" style="cursor:pointer;text-align:center">
            <div class="panel-cap">${labels[i]}</div>
            <div style="position:relative;display:inline-block">
              <img class="panel" src="${src}" style="width:270px;max-width:30vw;display:block">
              <div class="bws-ov" style="position:absolute;inset:0;display:none;align-items:center;
                   justify-content:center;border-radius:4px;font-weight:bold;font-size:19px;letter-spacing:1px;
                   color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.75)"></div>
            </div>
          </div>`).join('')}
      </div>
      ${trial.src_html || ''}
      <div style="margin-top:14px">
        <button class="jspsych-btn" id="bws-undo" style="margin-right:8px">${trial.undo_label}</button>
        <button class="jspsych-btn" id="bws-next" disabled>${trial.next_label}</button>
      </div>`;
    const ovs  = [...display_element.querySelectorAll('.bws-ov')];
    const next = display_element.querySelector('#bws-next');
    const paint = ()=>{
      ovs.forEach((o,i)=>{
        if(i===best){       o.style.display='flex'; o.style.background='rgba(76,175,80,0.42)'; o.textContent=trial.badge_best; }
        else if(i===worst){ o.style.display='flex'; o.style.background='rgba(229,57,53,0.42)'; o.textContent=trial.badge_worst; }
        else {              o.style.display='none'; o.textContent=''; }
      });
      next.disabled = (best===null || worst===null);
    };
    display_element.querySelectorAll('.bws-panel').forEach(p=>{
      p.onclick = ()=>{ const i = +p.dataset.i;
        if(best===null)        best = i;     // 1st pick -> BEST
        else if(i===best)      {}            // re-click best -> ignore (use undo)
        else if(worst===null)  worst = i;    // 2nd pick -> WORST
        paint();
      };
    });
    display_element.querySelector('#bws-undo').onclick = ()=>{
      if(worst!==null) worst = null; else if(best!==null) best = null;   // undo worst, then best
      paint();
    };
    next.onclick = ()=>{
      if(best===null || worst===null) return;
      this.jsPsych.finishTrial({
        best_pos: best, worst_pos: worst,
        best_method: methods[best], worst_method: methods[worst],
        rt: Math.round(performance.now() - t0)
      });
    };
  }
}

function drawTrial(stim, isPractice=false){
  const aspect=(stim.W||4)/(stim.H||3);

  if(ch>560){ ch=560; cw=Math.round(ch*aspect); }        // canvas aspect == image aspect (no distortion)

    target_loops: stim.kv, max_loops: 12,                 // kv stored for offline ref; not shown (avoid priming)
    canvas_width: cw, canvas_height: ch, image_id: 0,
    undo_label:()=>t('draw_undo'), clear_label:()=>t('draw_clear'), done_label:()=>t('draw_done'),
    err_none:()=>t('derr_none'), err_many:()=>t('derr_many'),
    data: { task:'draw', practice:isPractice, stim_id:stim.id, dataset:stim.ds, density:stim.dens,
            gt:stim.gt, kv:stim.kv, orig_W:stim.W, orig_H:stim.H }
  };
}

// 6) post questionnaire (finalized, all required)

// Page 1 (lay + expert): confidence (quality check) + open-ended (why)

// 7) save (robust) + set the "already participated" lock + thanks
//    Guarantees: (a) the repeat lock is set ONLY after the upload is confirmed, (b) network/
//    server failures retry, and (c) on total failure the data is NOT lost — the participant
//    gets their CSV as a local download and can retry.
const DATAPIPE_URL = "https://pipe.jspsych.org/api/data/";
const SAVE_MAX_ATTEMPTS = 4;

// one upload attempt; mirrors @jspsych-contrib/plugin-pipe's request exactly
async function datapipePost(filename, csv){
  const resp = await fetch(DATAPIPE_URL, {
    method: "POST",
    headers: { "Content-Type":"application/json", "Accept":"*/*" },
    body: JSON.stringify({ experimentID: EXPERIMENT_ID, filename, data: csv })
  });
  let body = {}; try { body = await resp.json(); } catch(e){ /* non-JSON body */ }
  // success = HTTP ok and no error field. A "filename already exists" reply means a previous
  // attempt's write actually landed on OSF (its response was just lost) -> treat as saved.
  const ok = (resp.ok && !body.error) || /exists/i.test(JSON.stringify(body));
  return { ok, status: resp.status, body };
}

class SaveDataPlugin {
  static info = { name:"save-data", version:"1.0.0", parameters:{},
    data:{ save_ok:{type:PT.BOOL}, save_attempts:{type:PT.INT}, save_status:{type:PT.INT} } };
  constructor(jsPsych){ this.jsPsych=jsPsych; }
  trial(display_element, trial){
    fab.style.display='none';                                  // hide the help (?) button on the final screen
    // duplicate forensics, logged into every row before the snapshot: was the repeat lock already
    // set (second tab / second run on this browser)? did an earlier run upload without confirmation?
    let lockAtSave=false, priorAttempt="", priorCompleted="";
    try {
      lockAtSave   = !!localStorage.getItem(DONE_KEY);
      priorAttempt = localStorage.getItem(PENDING_KEY) || "";
      if(/^TEST_/.test(priorAttempt)) priorAttempt = "";           // stale test-run marker -> ignore
      const di = doneInfo(); priorCompleted = (di && di.code) || "";   // links sequential two-tab duplicates
    } catch(e){}
    this.jsPsych.data.addProperties({ done_lock_at_save: lockAtSave, prior_attempt_id: priorAttempt,
                                      prior_completed_id: priorCompleted });
    const csv = this.jsPsych.data.get().csv();                 // snapshot once; retries reuse the same data
    // one file per run, named by the anonymous subject id; test runs prefixed for easy filtering
    const filename = `${TEST_MODE ? "TEST_" : ""}${subject_id}.csv`;
    try { if(!TEST_MODE) localStorage.setItem(PENDING_KEY, filename); } catch(e){}   // links a possible redo if confirmation is lost
    const self = this;

    const downloadCSV = ()=>{
      const blob = new Blob([csv], { type:"text/csv" });
      const url  = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href=url; a.download=filename;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
    };

    const run = async ()=>{
      for(let attempt=1; attempt<=SAVE_MAX_ATTEMPTS; attempt++){
        display_element.innerHTML =
          `<p>${t('saving')}</p><p style="color:#aaa;font-size:13px">(${attempt}/${SAVE_MAX_ATTEMPTS})</p>`;
        try {
          const r = await datapipePost(filename, csv);
          if(r.ok){
            markDone();                                         // set the repeat lock ONLY after a confirmed save
            try { localStorage.removeItem(PENDING_KEY); } catch(e){}
            self.jsPsych.finishTrial({ save_ok:true, save_attempts:attempt, save_status:r.status });
            return;                                            // -> timeline advances to the "thank you" screen
          }
        } catch(e){ /* network error -> fall through to retry */ }
        if(attempt < SAVE_MAX_ATTEMPTS) await new Promise(res=>setTimeout(res, 1200*attempt));  // backoff
      }
      // all attempts failed: do NOT advance to "thanks". Offer retry + manual download.
      display_element.innerHTML = `
        <h3>${t('save_fail_title')}</h3>
        <p style="text-align:left;max-width:560px;margin:10px auto">${t('save_fail_body')}</p>
        <div style="text-align:left;max-width:560px;margin:10px auto;font-size:14px;color:#555">
          ${t('withdraw_text').replace('{ID}', subject_id)}${contactLine()}</div>
        <div id="sd-note" style="color:#1a8a3a;font-weight:bold;min-height:1.4em;margin:8px"></div>
        <button class="jspsych-btn" id="sd-retry" style="margin-right:8px">${t('save_retry')}</button>
        <button class="jspsych-btn" id="sd-dl">${t('save_download')}</button>`;
      display_element.querySelector('#sd-retry').onclick = ()=>run();
      display_element.querySelector('#sd-dl').onclick = ()=>{
        downloadCSV();
        display_element.querySelector('#sd-note').textContent = t('save_downloaded');
      };
    };
    run();
  }
}
const save_and_finalize = { type: SaveDataPlugin };
const thanks = {
  type: jsPsychHtmlButtonResponse,
  stimulus: ()=>`<h3>${t('thanks_title')}</h3><p>${t('thanks_body')}</p>`
    + `<div style="margin:14px auto 0;max-width:560px;padding:12px 16px;border:1px solid #cfd8dc;`
    + `background:#f5f7f8;border-radius:10px;text-align:left">${t('withdraw_text').replace('{ID}', subject_id)}${contactLine()}</div>`
    + (PRIZE_FORM_URL
        ? `<div style="margin:18px auto 0;max-width:560px;padding:16px;border:1px solid #ffe08a;`
          + `background:#fff8e1;border-radius:10px">`
          + `<p style="text-align:left;margin-top:0">${t('prize_text')}</p>`
          + `<a class="jspsych-btn" href="${PRIZE_FORM_URL}" target="_blank" rel="noopener"`
          + ` style="text-decoration:none">${t('prize_btn')}</a></div>`
        : ``),
  // terminal in production: no button, so the participant code stays visible until the tab is closed.
  // (dev placeholder-ID mode keeps Finish so on_finish/displayData still works)
  choices: ()=> EXPERIMENT_ID==="REPLACE_WITH_DATAPIPE_ID" ? [t('finish')] : [],
  on_start: ()=>{ fab.style.display='none'; }
};

/* ===========================================================================
   TIMELINE
   =========================================================================== */
// --- per-participant assignment: random subset (image = random effect; exposure ~even) ---
const PRACTICE_BWS_ID  = "S001";
const PRACTICE_DRAW_ID = "S176";   // clear teaching example: plaza with distinct groups + density gradient
const byId = id => STIMULI.find(s => s.id === id);
const practiceBWS = byId(PRACTICE_BWS_ID) || STIMULI[0];
const practiceDraw = byId(PRACTICE_DRAW_ID) || STIMULI[1];
const rest = STIMULI.filter(s => s.id !== PRACTICE_BWS_ID && s.id !== PRACTICE_DRAW_ID);
const bwsSet  = jsPsych.randomization.sampleWithoutReplacement(rest, Math.min(N_BWS, rest.length));
const drawSet = jsPsych.randomization.sampleWithoutReplacement(rest.filter(s=>!bwsSet.includes(s)), N_DRAW);
jsPsych.data.addProperties({ bws_ids:[practiceBWS,...bwsSet].map(s=>s.id).join(" "),
                             draw_ids:[practiceDraw,...drawSet].map(s=>s.id).join(" ") });

const bws_block = [];
bws_block.push(bwsItem(practiceBWS, true));    // practice
for(const s of bwsSet) bws_block.push(bwsItem(s));
// TODO: insert attention-check items into bws_block.

const draw_block = [];
draw_block.push(drawTrial(practiceDraw, true));   // practice
for(const s of drawSet) draw_block.push(drawTrial(s));

// preload the assigned images (progress bar before Part 1)
const preload_imgs = [];
for(const s of [practiceBWS, ...bwsSet])  preload_imgs.push(STIM_BASE+s.v, STIM_BASE+s.g, STIM_BASE+s.q);
for(const s of [practiceDraw, ...drawSet]) preload_imgs.push(STIM_BASE+s.raw);
const preload = { type: jsPsychPreload, images: preload_imgs, show_progress_bar:true,
                  continue_after_error:true, message:"Loading images… / Bilder werden geladen…" };

const timeline = [ lang, welcome, consent, demographics, preload,
                   draw_instr, ...draw_block, bws_instr, ...bws_block, post1, post2, feedback ];
if(EXPERIMENT_ID!=="REPLACE_WITH_DATAPIPE_ID"){ timeline.push(save_and_finalize); }
timeline.push(thanks);

if(alreadyDone()){
  // repeat visit after a completed run -> polite bilingual stop screen (language not chosen yet);
  // re-displays the stored participant code so it stays recoverable after a reload
  const info = doneInfo();
  document.body.innerHTML = `
    <div style="max-width:640px;margin:80px auto;padding:0 16px;text-align:center;
                font-family:'Open Sans','Arial',sans-serif;color:#333">
      <h2>Vielen Dank! / Thank you!</h2>
      <p style="font-size:17px">${T.de.already_body}</p>
      <p style="font-size:17px;color:#666">${T.en.already_body}</p>
      ${info && info.code ? `<p style="font-size:15px;color:#555">Ihr Teilnahme-Code / Your participant code: <b>${info.code}</b></p>` : ''}
      ${CONTACT_EMAIL ? `<p style="font-size:14px;color:#777">Kontakt / Contact: <a href="mailto:${CONTACT_EMAIL}">${CONTACT_EMAIL}</a></p>` : ''}
    </div>`;
} else {
  jsPsych.run(timeline);
}
</script>
