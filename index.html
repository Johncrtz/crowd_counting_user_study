/* ===========================================================================
   TOKEN validation (JSONP — avoids CORS with a Google Apps Script backend)
   =========================================================================== */
function jsonp(url, timeoutMs=8000){
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Math.random().toString(36).slice(2);
    const s = document.createElement("script");
    let done = false;
    const cleanup = () => { try{ delete window[cb]; }catch(e){ window[cb]=undefined; }
                            if(s.parentNode) s.remove(); clearTimeout(timer); };
    const timer = setTimeout(() => { if(done) return; done=true; cleanup(); reject(new Error("jsonp timeout")); }, timeoutMs);
    window[cb] = (data) => { if(done) return; done=true; cleanup(); resolve(data); };
    s.onerror   = ()     => { if(done) return; done=true; cleanup(); reject(new Error("jsonp failed")); };
    s.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb;
    document.body.appendChild(s);
  });
}
async function validateToken(tok){
  if(!TOKEN_API){ console.warn("TOKEN_API not set — DEV mode: accepting any non-empty token"); return true; }
  try { const j = await jsonp(`${TOKEN_API}?action=validate&token=${encodeURIComponent(tok)}`); return !!j.valid; }
  catch(e){ console.error(e); return false; }
}
async function markTokenUsed(tok){
  if(!TOKEN_API || !tok) return;
  try { await jsonp(`${TOKEN_API}?action=markUsed&token=${encodeURIComponent(tok)}`); }
  catch(e){ console.error(e); }
}

/* ===========================================================================
   PLACEHOLDER STIMULI (inline SVG; replace with real renders later)
   =========================================================================== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function makeCrowd(seed,w,h,nClusters=1){
  const r=mulberry32(seed); const pts=[];
  for(let c=0;c<nClusters;c++){
    const cx=w*(0.20+0.60*r()), cy=h*(0.20+0.60*r());
    const nd=70+Math.floor(60*r());
    for(let i=0;i<nd;i++) pts.push([cx+(r()-0.5)*w*0.26, cy+(r()-0.5)*h*0.26]);
  }
  for(let i=0;i<35;i++) pts.push([r()*w, r()*h]);
  return pts.filter(p=>p[0]>3&&p[0]<w-3&&p[1]>3&&p[1]<h-3);
}
function svgURI(inner,w,h){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${inner}</svg>`;
  return "data:image/svg+xml,"+encodeURIComponent(svg);
}
function dotsSVG(pts){ return pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.1" fill="#333"/>`).join(''); }
const STK='stroke="#d2322d" stroke-width="2" fill="none"';
function gridOverlay(w,h){ let s=''; const n=3;
  for(let i=1;i<n;i++){ s+=`<line x1="${(i*w/n).toFixed(1)}" y1="0" x2="${(i*w/n).toFixed(1)}" y2="${h}" ${STK}/>`;
                        s+=`<line x1="0" y1="${(i*h/n).toFixed(1)}" x2="${w}" y2="${(i*h/n).toFixed(1)}" ${STK}/>`; } return s; }
function quadOverlay(w,h){ let s='';
  s+=`<line x1="${w/2}" y1="0" x2="${w/2}" y2="${h}" ${STK}/>`;
  s+=`<line x1="0" y1="${h/2}" x2="${w}" y2="${h/2}" ${STK}/>`;
  s+=`<line x1="${3*w/4}" y1="0" x2="${3*w/4}" y2="${h/2}" ${STK}/>`;
  s+=`<line x1="${w/2}" y1="${h/4}" x2="${w}" y2="${h/4}" ${STK}/>`;
  s+=`<line x1="${w/4}" y1="${h/2}" x2="${w/4}" y2="${h}" ${STK}/>`;
  s+=`<line x1="0" y1="${3*h/4}" x2="${w/2}" y2="${3*h/4}" ${STK}/>`; return s; }
function voronoiOverlay(w,h){ let s='';
  s+=`<polyline points="${0.45*w},0 ${0.55*w},${0.35*h} ${0.40*w},${0.72*h} ${0.50*w},${h}" ${STK}/>`;
  s+=`<polyline points="${0.55*w},${0.35*h} ${w},${0.45*h}" ${STK}/>`;
  s+=`<polyline points="0,${0.60*h} ${0.40*w},${0.72*h}" ${STK}/>`;
  s+=`<polyline points="${0.55*w},${0.35*h} ${0.70*w},0" ${STK}/>`; return s; }
function panel(pts,overlay,w,h){
  const inner=`<rect x="0" y="0" width="${w}" height="${h}" fill="#f4f4f2"/>`+dotsSVG(pts)+(overlay||'');
  return svgURI(inner,w,h);
}

function exGood(){ const w=150,h=110; const pts=makeCrowd(9,w,h,1);

function exOpen(){ const w=150,h=110; const pts=makeCrowd(9,w,h,1);
  return svgURI(`<rect width="${w}" height="${h}" fill="#f4f4f2"/>${dotsSVG(pts)}<path d="M30,80 Q75,20 120,75" fill="none" stroke="#c0392b" stroke-width="3"/>`,w,h); }
function exCross(){ const w=150,h=110;

/* ===========================================================================
   geometry helpers for draw guardrails
   =========================================================================== */
function shoelace(p){ let a=0; for(let i=0;i<p.length-1;i++){ a+=p[i].x*p[i+1].y - p[i+1].x*p[i].y; } return Math.abs(a)/2; }
function ccw(a,b,c){ return (c.y-a.y)*(b.x-a.x) > (b.y-a.y)*(c.x-a.x); }
function segInt(a,b,c,d){ return ccw(a,c,d)!==ccw(b,c,d) && ccw(a,b,c)!==ccw(a,b,d); }
function downsample(p,k){ if(p.length<=k) return p.slice(); const out=[]; const step=(p.length-1)/(k-1);
  for(let i=0;i<k;i++) out.push(p[Math.round(i*step)]); return out; }
function dedupe(p,eps=3){ const out=[p[0]]; for(let i=1;i<p.length;i++){ const a=out[out.length-1],b=p[i];
  if(Math.hypot(b.x-a.x,b.y-a.y)>=eps) out.push(b); } return out; }
function selfIntersects(poly){ // poly: closed ring (first==last). returns true if any non-adjacent edges cross
  const n=poly.length-1; if(n<4) return false;
  for(let i=0;i<n;i++) for(let j=i+2;j<n;j++){
    if(i===0 && j===n-1) continue; // adjacent (shared closing vertex)
    if(segInt(poly[i],poly[i+1],poly[j],poly[j+1])) return true;
  } return false; }

const PT = jsPsychModule.ParameterType;
class DrawGroupsPlugin {
  static info = {
    name: "draw-groups", version: "2.0.0",
    parameters: {
      image_src:{type:PT.STRING,default:""}, prompt:{type:PT.HTML_STRING,default:""},
      hint:{type:PT.HTML_STRING,default:""}, target_loops:{type:PT.INT,default:1}, max_loops:{type:PT.INT,default:3},
      canvas_width:{type:PT.INT,default:600}, canvas_height:{type:PT.INT,default:450}, image_id:{type:PT.INT,default:0},
      undo_label:{type:PT.STRING,default:"Undo"}, clear_label:{type:PT.STRING,default:"Clear"}, done_label:{type:PT.STRING,default:"Done"},
      err_none:{type:PT.STRING,default:""}, err_open:{type:PT.STRING,default:""},
      err_cross:{type:PT.STRING,default:""}, err_many:{type:PT.STRING,default:""}
    },
    data:{ strokes:{type:PT.STRING}, n_strokes:{type:PT.INT}, target_loops:{type:PT.INT},
           canvas_width:{type:PT.INT}, canvas_height:{type:PT.INT}, image_id:{type:PT.INT}, rt:{type:PT.INT} }
  };
  constructor(jsPsych){ this.jsPsych=jsPsych; }
  trial(display_element, trial){
    const W=trial.canvas_width, H=trial.canvas_height;
    display_element.innerHTML = `
      ${trial.prompt}
      <p style="color:#555;margin:4px 0">${trial.hint}</p>
      <div><canvas id="dg" width="${W}" height="${H}"
           style="border:1px solid #999;cursor:crosshair;touch-action:none;max-width:100%"></canvas></div>
      <div id="dgerr" style="color:#c0392b;min-height:1.3em;margin:8px;font-weight:bold"></div>
      <div>
        <button class="jspsych-btn" id="dgundo">${trial.undo_label}</button>
        <button class="jspsych-btn" id="dgclear">${trial.clear_label}</button>
        <button class="jspsych-btn" id="dgdone">${trial.done_label}</button>
      </div>`;
    const canvas=display_element.querySelector('#dg'), ctx=canvas.getContext('2d');
    const errEl=display_element.querySelector('#dgerr');
    const img=new Image(); let strokes=[], cur=null, drawing=false; const t0=performance.now();

    function redraw(){
      ctx.clearRect(0,0,W,H);
      if(img.complete && img.naturalWidth) ctx.drawImage(img,0,0,W,H);
      ctx.lineWidth=3; ctx.strokeStyle='rgba(26,138,58,0.9)'; ctx.lineJoin='round'; ctx.lineCap='round';
      const all = cur ? strokes.concat([cur]) : strokes;
      for(const s of all){ if(s.length<1) continue; ctx.beginPath(); ctx.moveTo(s[0].x,s[0].y);
        for(let i=1;i<s.length;i++) ctx.lineTo(s[i].x,s[i].y);
        if(s!==cur) ctx.closePath();   // show committed loops closed
        ctx.stroke(); }
    }
    img.onload=redraw; img.src=trial.image_src;

    function pos(e){ const r=canvas.getBoundingClientRect();
      const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left, cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
      return {x:Math.round(cx*W/r.width), y:Math.round(cy*H/r.height)}; }
    const start=(e)=>{ e.preventDefault(); drawing=true; cur=[pos(e)]; errEl.textContent=''; redraw(); };
    const move =(e)=>{ if(!drawing) return; e.preventDefault(); cur.push(pos(e)); redraw(); };
    const end  =(e)=>{ if(!drawing) return; e.preventDefault(); if(cur&&cur.length>2) strokes.push(cur); cur=null; drawing=false; redraw(); };
    canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
    canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end,{passive:false});

    display_element.querySelector('#dgundo').onclick  = ()=>{ strokes.pop(); errEl.textContent=''; redraw(); };
    display_element.querySelector('#dgclear').onclick = ()=>{ strokes=[]; errEl.textContent=''; redraw(); };
    display_element.querySelector('#dgdone').onclick  = ()=>{
      const minArea = 0.008*W*H;   // reject lines / tiny shapes
      const clean=[]; let openBad=false, crossBad=false;
      for(const s of strokes){
        const ds=dedupe(s);                          // drop near-duplicate samples (avoids false self-intersections)
        if(ds.length<6){ openBad=true; continue; }
        const ring=ds.concat([ds[0]]);               // auto-close
        if(shoelace(ring) < minArea){ openBad=true; continue; }
        if(selfIntersects(downsample(ring,60))){ crossBad=true; continue; }
        clean.push(ring);
      }
      if(crossBad){ errEl.textContent=trial.err_cross; return; }
      if(openBad){ errEl.textContent=trial.err_open; return; }
      if(clean.length===0){ errEl.textContent=trial.err_none; return; }
      if(clean.length>trial.max_loops){ errEl.textContent=trial.err_many.replace('{M}',trial.max_loops); return; }
      window.removeEventListener('mouseup',end);
      const data={ strokes:JSON.stringify(clean), n_strokes:clean.length, target_loops:trial.target_loops,
                   canvas_width:W, canvas_height:H, image_id:trial.image_id, rt:Math.round(performance.now()-t0) };
      display_element.innerHTML='';
      this.jsPsych.finishTrial(data);
    };
  }
}

// 1) token gate
class TokenGatePlugin {
  static info = { name:"token-gate", version:"1.0.0",
    parameters:{ prompt:{type:PT.HTML_STRING,default:""}, button_label:{type:PT.STRING,default:"Start"},
      err_empty:{type:PT.STRING,default:""}, err_invalid:{type:PT.STRING,default:""} },
    data:{ token:{type:PT.STRING} } };
  constructor(jsPsych){ this.jsPsych=jsPsych; }
  trial(display_element, trial){
    display_element.innerHTML = `${trial.prompt}
      <div><input id="tok" type="text" autocomplete="off" spellcheck="false"
           style="font-size:18px;padding:6px;text-align:center;text-transform:uppercase"></div>
      <div id="tokerr" style="color:#c0392b;min-height:1.3em;margin:8px"></div>
      <button class="jspsych-btn" id="toksub">${trial.button_label}</button>`;
    const inp=display_element.querySelector('#tok'), err=display_element.querySelector('#tokerr'), btn=display_element.querySelector('#toksub');
    const submit=async()=>{ const tok=inp.value.trim().toUpperCase();
      if(!tok){ err.textContent=trial.err_empty; return; }
      btn.disabled=true; err.textContent='…';
      const ok=await validateToken(tok);
      if(ok){ TOKEN=tok; this.jsPsych.data.addProperties({token:tok}); this.jsPsych.finishTrial({token:tok}); }
      else { err.textContent=trial.err_invalid; btn.disabled=false; } };
    btn.onclick=submit; inp.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); }); inp.focus();
  }
}
const token_gate = {
  type: TokenGatePlugin,
  prompt: ()=>t('token_prompt'), button_label: ()=>t('token_btn'),
  err_empty: ()=>t('token_empty'), err_invalid: ()=>t('token_invalid')
};

// 4) BWS instructions (sets the help text for the block)
const bws_instr = {
  type: jsPsychHtmlButtonResponse,
  stimulus: ()=>`<h3>${t('bws_title')}</h3>${t('bws_body')}`,
  choices: ()=>[t('got_it')],

};

// one BWS item = best screen + worst screen (worst excludes the best pick)
function bwsItem(i, isPractice=false){
  const w=240,h=180;
  const pts=makeCrowd(1000+i,w,h, 1 + (i%2));
  const methods=[
    {m:'grid',    src:panel(pts,gridOverlay(w,h),w,h)},
    {m:'quad',    src:panel(pts,quadOverlay(w,h),w,h)},
    {m:'voronoi', src:panel(pts,voronoiOverlay(w,h),w,h)}
  ];
  const order=jsPsych.randomization.shuffle([0,1,2]);     // position -> method index
  const layout=order.map(idx=>methods[idx].m);            // method at A/B/C
  const labels=['A','B','C'];
  const baseChoices=order.map((idx,pos)=>`<div class="panel-cap">${labels[pos]}</div><img class="panel" src="${methods[idx].src}" width="${w}" height="${h}">`);
  let bestPos = null;

  const best = {
    type: jsPsychHtmlButtonResponse,
    stimulus: ()=>`${isPractice?`<div class="practice-banner">${t('practice')}</div>`:''}<p>${t('bws_best')}</p>`,
    choices: ()=>baseChoices,
    data: { task:'bws', phase:'best', practice:isPractice, image_id:i, layout:JSON.stringify(layout) },
    on_finish: (d)=>{ d.best_pos=d.response; d.best_method=layout[d.response]; bestPos=d.response; }
  };
  const worst = {
    type: jsPsychHtmlButtonResponse,
    stimulus: ()=>`${isPractice?`<div class="practice-banner">${t('practice')}</div>`:''}<p>${t('bws_worst')}</p><p style="color:#888;font-size:13px">${t('bws_worst_note')}</p>`,
    choices: ()=>baseChoices,
    // disable the option chosen as best (best != worst)
    button_html: (choice, idx)=> idx===bestPos
        ? `<button class="jspsych-btn" disabled style="opacity:.35;cursor:not-allowed;pointer-events:none">${choice}</button>`
        : `<button class="jspsych-btn">${choice}</button>`,
    data: { task:'bws', phase:'worst', practice:isPractice, image_id:i, layout:JSON.stringify(layout) },
    on_finish: (d)=>{ d.worst_pos=d.response; d.worst_method=layout[d.response]; }
  };
  return [best, worst];
}

    <div>
      <div class="grp"><img src="${exGood()}"><div style="color:#1a8a3a">✓ ${t('ex_good')}</div></div>
      <div class="grp"><img src="${exOpen()}"><div style="color:#c0392b">✗ ${t('ex_open')}</div></div>
      <div class="grp"><img src="${exCross()}"><div style="color:#c0392b">✗ ${t('ex_cross')}</div></div>
      <div class="grp"><img src="${exMany()}"><div style="color:#c0392b">✗ ${t('ex_many')}</div></div>
    </div>`,
  choices: ()=>[t('got_it')],

function drawTrial(i, isPractice=false){
  const W=600,H=450; const nClusters = 1 + (i%3);   // 1..3 groups
  const pts=makeCrowd(2000+i,W,H,nClusters);
  return {
    type: DrawGroupsPlugin,
    image_src: panel(pts,null,W,H),
    prompt: ()=>`${isPractice?`<div class="practice-banner">${t('practice')}</div>`:''}<p><b>${t('draw_title')}</b></p>`,
    hint: ()=>t('draw_hint').replace('{N}', nClusters),
    target_loops: nClusters, max_loops: nClusters+2,
    canvas_width:W, canvas_height:H, image_id:i,
    undo_label:()=>t('draw_undo'), clear_label:()=>t('draw_clear'), done_label:()=>t('draw_done'),
    err_none:()=>t('derr_none'), err_open:()=>t('derr_open'),
    err_cross:()=>t('derr_cross'), err_many:()=>t('derr_many'),
    data: { task:'draw', practice:isPractice }
  };
}

const likert = (name,q)=>`<div class="form-row">${q}</div><div style="margin-bottom:14px">`+
  `<span style="font-size:12px;color:#888">${'{LO}'}</span> `+
  [1,2,3,4,5].map(v=>`<label class="lik">${v}<br><input type="radio" name="${name}" value="${v}" required></label>`).join('')+
  ` <span style="font-size:12px;color:#888">${'{HI}'}</span></div>`;
const post = {
  type: jsPsychSurveyHtmlForm,
  preamble: ()=>`<h3>${t('post_title')}</h3>${t('post_intro')}`,
  button_label: ()=>t('finish'),
  html: ()=> (likert('clarity',t('q_clarity')) + likert('trust',t('q_trust')) + likert('pref',t('q_pref')))
              .replaceAll('{LO}', t('lik_lo')).replaceAll('{HI}', t('lik_hi')),
  data: { task:'post' }
};

  on_start: ()=>{ markTokenUsed(TOKEN); }
};

  type: jsPsychHtmlButtonResponse,
  stimulus: ()=>`<h3>${t('thanks_title')}</h3><p>${t('thanks_body')}</p>`,
  choices: ()=>[t('finish')],
  on_start: ()=>{ fab.style.display='none'; }
};

/* ===========================================================================
   TIMELINE
   =========================================================================== */
const bws_block = [];
bws_block.push(...bwsItem(900, true));            // practice (reserved id)
for(let i=0;i<N_BWS;i++) bws_block.push(...bwsItem(i));

const draw_block = [];
draw_block.push(drawTrial(900, true));            // practice (reserved id)
for(let i=0;i<N_DRAW;i++) draw_block.push(drawTrial(i));

const timeline = [ lang, token_gate, consent, demographics,
                   bws_instr, ...bws_block, draw_instr, ...draw_block, post ];
if(EXPERIMENT_ID!=="REPLACE_WITH_DATAPIPE_ID"){ timeline.push(save_data, finalize_token); }
timeline.push(thanks);

jsPsych.run(timeline);
